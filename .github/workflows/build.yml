name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'

    - name: Fix compileSdk and targetSdk
      run: |
        sed -i 's/compileSdk = 35/compileSdk = 34/g' IronOreCalc/app/build.gradle.kts
        sed -i 's/targetSdk = 35/targetSdk = 34/g' IronOreCalc/app/build.gradle.kts

    - name: Grant execute permission for gradlew
      run: chmod +x IronOreCalc/gradlew || true

    - name: Build APK with Gradle
      run: |
        cd IronOreCalc
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: IronOreCalc/app/build/outputs/apk/debug/*.apk
