name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar
        working-directory: IronOreCalc

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: IronOreCalc

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('IronOreCalc/**/*.gradle*', 'IronOreCalc/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: IronOreCalc
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: IronOreCalc-debug-apk
          path: IronOreCalc/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "✅ Build successful!"
          ls -lh IronOreCalc/app/build/outputs/apk/debug/
